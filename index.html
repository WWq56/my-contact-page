<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>联系我</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #ff2442 0%, #ff6034 100%);
            min-height: 100vh;
            padding: 60px 20px;
            text-align: center;
            color: #fff;
        }
        .box{
            background:#fff;
            border-radius:16px;
            padding:40px 20px;
            max-width:360px;
            margin:0 auto;
            color:#333;
        }
        h2{
            margin-bottom:10px;
            font-size:22px;
        }
        .tip{
            color:#999;
            margin-bottom:30px;
            font-size:14px;
        }
        .btn{
            display:block;
            text-decoration:none;
            padding:15px;
            margin:15px 0;
            border-radius:50px;
            font-size:17px;
            font-weight:bold;
        }
        .wx{
            background:#07c160;
            color:#fff;
        }
        .tel{
            background:#1677ff;
            color:#fff;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>我的联系方式</h2>
        <p class="tip">快手私信回复慢，微信电话同号</p>

        <a class="btn wx" href="javascript:alert('微信号：18520057554，复制去微信添加即可')">
            点击获取微信号
        </a>

        <a class="btn tel" href="tel:18520057554">
            点击拨打手机号
        </a>
    </div>
</body>
</html>
